<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WATCHMEN DOOMSDAY CLOCK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body {
      font-family: 'Press Start 2P', system-ui;
      background: #0a0a0a;
      color: #ffcc00;
      margin: 0;
      padding: 0;
    }
    .clock-face {
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
      border: 14px solid #ffcc00;
      box-shadow: 0 0 50px #ff0000, inset 0 0 30px #440000;
      position: relative;
    }
    #hand {
      position: absolute;
      width: 6px;
      background: #ff0000;
      height: 120px;
      left: 50%;
      top: 50%;
      transform-origin: bottom center;
      border-radius: 3px;
      box-shadow: 0 0 15px #ff0000;
      transition: transform 0.8s ease-in-out;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden">
  <div class="absolute inset-0 bg-[radial-gradient(#ff000033_1px,transparent_1px)] [background-size:40px_40px] opacity-40 pointer-events-none"></div>

  <header class="text-center mb-8">
    <h1 class="text-5xl font-bold tracking-widest text-red-600">WATCHMEN</h1>
    <h2 class="text-4xl font-bold tracking-widest text-yellow-400 -mt-2">DOOMSDAY CLOCK</h2>
    <p class="text-red-500 text-lg mt-2">85 SECONDS TO MIDNIGHT</p>
  </header>

  <div class="relative mb-10">
    <div class="clock-face rounded-full mx-auto flex items-center justify-center">
      <!-- Center dot -->
      <div class="absolute w-5 h-5 bg-red-600 rounded-full z-10 shadow-[0_0_20px_#ff0000]"></div>
      
      <!-- Clock hand -->
      <div id="hand" style="transform: rotate(-75deg);"></div>
      
      <!-- Ticks -->
      <div class="absolute inset-0 rounded-full border-4 border-yellow-400/40"></div>
    </div>
    
    <div class="text-center mt-8">
      <div id="seconds" class="text-7xl font-bold text-red-500 tracking-widest font-mono">85</div>
      <div class="text-yellow-300 text-sm">SECONDS REMAINING</div>
    </div>
  </div>

  <div class="w-full max-w-md bg-black/80 border border-red-500/50 p-6 rounded-2xl">
    <h3 class="text-xl mb-4 flex items-center gap-2"><i class="fas fa-skull-crossbones"></i> CURRENT THREATS</h3>
    <div id="news" class="space-y-3 text-sm"></div>
    <button onclick="refresh()" class="mt-6 w-full py-3 bg-red-600 hover:bg-red-700 text-white text-xs tracking-widest">REFRESH THREATS</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
    // Clock animation
    let angle = -75;
    function tick() {
      const hand = document.getElementById('hand');
      angle += 0.4;
      if (angle > 90) angle = -75;
      hand.style.transform = `rotate(${angle}deg)`;
    }
    setInterval(tick, 600);

    // Threats
    const threats = [
      "🇷🇺🇺🇦 Nuclear rhetoric intensifies",
      "🤖 AI arms race accelerates",
      "🌍 Record heatwaves & climate tipping points",
      "⚡ Geopolitical flashpoints multiply",
      "🧬 Biosecurity threats rising"
    ];

    function renderThreats() {
      document.getElementById('news').innerHTML = threats.map(t => 
        `<div class="flex items-start gap-3 bg-black/50 p-3 border-l-4 border-red-500"><span class="text-xl">⚠️</span><p>${t}</p></div>`
      ).join('');
    }

    function refresh() {
      confetti({particleCount: 100, spread: 70, origin: { y: 0.6 }});
      renderThreats();
    }

    // Start everything
    window.onload = () => {
      renderThreats();
      setInterval(() => {
        if (Math.random() > 0.6) confetti({particleCount: 40, spread: 60, colors: ['#ff0000','#ffcc00']});
      }, 8000);
    };
  </script>
</body>
</html>
